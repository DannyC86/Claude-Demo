<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flowly Docs — Ask Anything</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e2e4ea;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #6c63ff, #48cfad);
      border-radius: 8px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    header span {
      font-size: 13px;
      color: #7b7f9e;
      margin-left: 4px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      padding: 0 24px;
    }

    .message.user { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }

    .bubble {
      max-width: min(680px, 85%);
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .message.user .bubble {
      background: #6c63ff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #fff;
      border: 1px solid #e2e4ea;
      border-bottom-left-radius: 4px;
    }

    .message.assistant .bubble.loading {
      color: #7b7f9e;
      font-style: italic;
    }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #7b7f9e;
      padding: 48px;
      text-align: center;
    }

    #empty-state .icon { font-size: 40px; }
    #empty-state p { font-size: 15px; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggestion-chip {
      background: #fff;
      border: 1px solid #e2e4ea;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .suggestion-chip:hover {
      background: #f0efff;
      border-color: #6c63ff;
      color: #6c63ff;
    }

    footer {
      background: #fff;
      border-top: 1px solid #e2e4ea;
      padding: 16px 24px;
    }

    #input-row {
      display: flex;
      gap: 10px;
      max-width: 760px;
      margin: 0 auto;
    }

    #question {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #e2e4ea;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      resize: none;
      height: 48px;
      max-height: 140px;
      overflow-y: auto;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    #question:focus { border-color: #6c63ff; }

    #send-btn {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      border: none;
      background: #6c63ff;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }

    #send-btn:hover { background: #5a52e0; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error { color: #e53e3e; }
  </style>
</head>
<body>

<header>
  <div class="logo"></div>
  <h1>Flowly Docs</h1>
  <span>Ask anything</span>
</header>

<div id="chat">
  <div id="empty-state">
    <div class="icon">📚</div>
    <p>Ask a question about Flowly and get an answer straight from the docs.</p>
    <div class="suggestions">
      <button class="suggestion-chip" onclick="ask('What pricing plans does Flowly offer?')">Pricing plans</button>
      <button class="suggestion-chip" onclick="ask('How do I invite team members?')">Invite team members</button>
      <button class="suggestion-chip" onclick="ask('What integrations does Flowly support?')">Integrations</button>
      <button class="suggestion-chip" onclick="ask('Does Flowly have an API?')">API access</button>
    </div>
  </div>
</div>

<footer>
  <div id="input-row">
    <textarea
      id="question"
      placeholder="Ask a question about Flowly…"
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button id="send-btn" onclick="submitQuestion()" title="Send">&#8593;</button>
  </div>
</footer>

<script>
  const chat = document.getElementById('chat');
  const emptyState = document.getElementById('empty-state');
  const textarea = document.getElementById('question');
  const sendBtn = document.getElementById('send-btn');

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      submitQuestion();
    }
  }

  function addMessage(role, text, extra = '') {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `<div class="bubble ${extra}">${escapeHtml(text)}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  async function ask(question) {
    textarea.value = question;
    await submitQuestion();
  }

  async function submitQuestion() {
    const question = textarea.value.trim();
    if (!question || sendBtn.disabled) return;

    if (emptyState) emptyState.remove();

    addMessage('user', question);
    textarea.value = '';
    textarea.style.height = '48px';
    sendBtn.disabled = true;

    const loadingEl = addMessage('assistant', 'Thinking…', 'loading');

    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        loadingEl.querySelector('.bubble').classList.remove('loading');
        loadingEl.querySelector('.bubble').classList.add('error');
        loadingEl.querySelector('.bubble').textContent = data.error || 'Something went wrong. Please try again.';
      } else {
        loadingEl.querySelector('.bubble').classList.remove('loading');
        loadingEl.querySelector('.bubble').textContent = data.answer;
      }
    } catch {
      loadingEl.querySelector('.bubble').classList.remove('loading');
      loadingEl.querySelector('.bubble').classList.add('error');
      loadingEl.querySelector('.bubble').textContent = 'Could not reach the server. Is it running?';
    }

    sendBtn.disabled = false;
    textarea.focus();
    chat.scrollTop = chat.scrollHeight;
  }
</script>

</body>
</html>
